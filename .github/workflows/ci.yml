name: Stage Partner CI / CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: GO BACKEND ---
  backend-ci:
    name: Go Backend (lint, test, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/backend/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./apps/backend

      - name: Test
        run: CGO_ENABLED=1 go test -v -race -count=1 ./...

      - name: Build
        run: CGO_ENABLED=0 go build -o main .

  # --- JOB 2: NEXT.JS FRONTEND ---
  frontend-ci:
    name: Frontend (lint, typecheck, build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # --- JOB 3: DOCKER BUILD CHECK ---
  docker-ci:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Go Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: false
          tags: stagepartner-backend:ci
