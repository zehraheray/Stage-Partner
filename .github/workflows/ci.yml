name: Stage Partner CI / CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: GO BACKEND TESTS & LINTING ---
  backend-ci:
    name: Go Backend Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./apps/backend

    steps:
      - name: Code Repository Checkout
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: apps/backend/go.sum

      - name: Install Go Dependencies
        run: go mod download

      - name: Run Go Unit Tests
        run: go test -v ./...

      - name: Go Build Check
        run: CGO_ENABLED=0 go build -o main .

  # --- JOB 2: DOCKER BUILD CHECK ---
  docker-ci:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: backend-ci

    steps:
      - name: Code Repository Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Go Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          file: ./apps/backend/Dockerfile
          push: false
          tags: stagepartner-backend:ci