services:
  # 1. PostgreSQL Veritabanı Servisi
  db:
    image: postgres:15-alpine
    container_name: stagepartner_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: stagepartner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stagepartner_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Go API Backend Servisi
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: stagepartner_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgrespassword
      DB_NAME: stagepartner
      DB_PORT: 5432
      GIN_MODE: release
    networks:
      - stagepartner_net
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  stagepartner_net:
    driver: bridge
